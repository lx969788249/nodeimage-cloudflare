name: Sync upstream

on:
  schedule:
    - cron: '0 19 * * *'   # 每天北京时间凌晨 3 点
  workflow_dispatch:         # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/lx969788249/nodeimage-cloudflare.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync from upstream"
          git push origin main
